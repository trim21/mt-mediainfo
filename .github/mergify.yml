merge_queue:
  max_parallel_checks: 1
  queued_label: "ci:queued"
  dequeued_label: "ci:dequeued"

queue_rules:
  - name: renovate
    update_method: merge

pull_request_rules:
  - name: label conflicts
    conditions:
      - conflict
    actions:
      label:
        toggle:
          - conflict

  - name: Automatic merge on approval
    conditions:
      - "#commits-behind=0"
      - or:
          - "#approved-reviews-by>=1"
          - label=ci:auto-merge
      - not:
          and:
            - "head*=renovate/lockfile-maintenance-*"
            - "created-at>24h ago"
      - base=master
      - check-success=mypy
      - check-success=pre-commit
      - check-success=docker
      - check-success=pyright
    actions:
      queue:
        name: renovate
