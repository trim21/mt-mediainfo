name: neptune-rtorrent

on:
  push:
    paths-ignore:
      - "*.md"
    branches:
      - master
  pull_request:
    paths-ignore:
      - "*.md"
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: local

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          repository: trim21/neptune

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary (linux/amd64)
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build \
            -tags release \
            -ldflags="-s -w -X 'neptune/internal/pkg/global.UserAgent=rtorrent/0.9.8/0.13.8' -X 'neptune/internal/core.peerIDPrefix=-TR2930-'" \
            -trimpath \
            -o dist/neptune_linux_amd64

      - name: Build binary (linux/arm64)
        run: |
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build \
            -tags release \
            -ldflags="-s -w -X 'neptune/internal/pkg/global.UserAgent=rtorrent/0.9.8/0.13.8' -X 'neptune/internal/core.peerIDPrefix=-TR2930-'" \
            -trimpath \
            -o dist/neptune_linux_arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/neptune-rtorrent
          tags: |
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          provenance: false
          file: etc/Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          github-token: ${{ github.token }}
          cache-from: type=gha,scope=neptune-rtorrent
          cache-to: type=gha,mode=max,scope=neptune-rtorrent
