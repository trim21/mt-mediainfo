name: build

on:
  push:
    paths-ignore:
      - "*.md"
    branches:
      - master
  pull_request:
    paths-ignore:
      - "*.md"
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: "ubuntu-24.04"
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - uses: docker/login-action@v4.1.0
        if: ${{ github.event_name == 'push' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: "ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}"
          tags: |
            type=ref,event=branch

      - name: Compute version
        id: version
        run: |
          COMMIT_TS=$(git log -1 --format=%ct)
          VERSION=$(TZ='Asia/Shanghai' date -d "@$COMMIT_TS" '+%Y-%m-%d %H:%M:%S')-$(git rev-parse --short HEAD)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.version.outputs.VERSION }}
          cache-from: type=gha,scope=buildkit-${{ runner.arch }}
          cache-to: type=gha,mode=max,scope=buildkit-${{ runner.arch }}
          github-token: ${{ github.token }}

      - uses: actions/delete-package-versions@v5.0.0
        if: ${{ github.event_name == 'push' }}
        with:
          owner: "trim21"
          ignore-versions: "^master$"
          token: ${{ github.token }}
          package-name: "mt-mediainfo"
          package-type: "container"
          min-versions-to-keep: 1
