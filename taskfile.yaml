version: 3

tasks:
  default:
    - ruff check . --fix --fixable=ALL
    - black .
    - mypy .

  sync:
    cmd: 'uv sync {{- if eq OS "linux" }} --locked --no-dev {{- end }}'

  dev:
    env:
      MT_API_TOKEN: 'cc281f5f-2ccd-49bd-9bef-f4d6f8ae88e7'
    cmd: watchexec -e py,sql,toml -w app --delay-run 1s --no-process-group -- python ./main.py

  server: uvicorn pt_repost.server:app --port 8745 --host 0.0.0.0 --reload
