version: 3

tasks:
  default:
    - ruff check . --fix --fixable=ALL
    - black .
    - mypy .

  sync:
    cmd: 'uv sync {{- if eq OS "linux" }} --locked --no-dev {{- end }}'

  dev:
    dotenv:
      - .env
    cmd: watchexec -r -e py,sql --delay-run 1s --no-process-group --shell=none --verbose -- python ./main.py node

  server: uvicorn pt_repost.server:app --port 8745 --host 0.0.0.0 --reload
