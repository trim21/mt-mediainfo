[project]
name = 'pt-repost'
version = '0'
requires-python = '==3.10.19'
description = ''
dependencies = [
    'orjson==3.11.4',
    "uuid-utils==0.11.1",
    'rich==14.2.0',
    'xxhash==3.6.0',
    'qbittorrent-api==2025.7.0',
    'click==8.3.0',
    'pydantic==2.11.9',
    'httpx==0.28.1',
    'bencode2==0.3.27',
    'tomli==2.3.0',
    'yarl==1.22.0',
    'psycopg[binary,pool]==3.2.12',
    'durationpy==0.10',
    'fastapi==0.120.4',
    'uvicorn==0.38.0',
    'rapidocr-onnxruntime==1.4.4',
    'jinja2==3.1.6',
    'tzdata',
    "six==1.17.0",
    "tenacity==9.1.2",
    "more-itertools==10.8.0",
    "sslog==0.0.0a52",
    "regex==2025.9.18",
    "asyncpg==0.30.0",
]

[dependency-groups]
dev = [
    "asyncpg-stubs==0.30.2",
    'mypy',
    "types-regex==2025.10.23.20251023",
    "types-six==1.17.0.20250515",
]

[tool.uv]
package = false

[tool.pytest.ini_options]
cache_dir = '.venv/.cache/pytest'

[tool.mypy]
exclude = 'build,data'
mypy_path = '$MYPY_CONFIG_FILE_DIR'
python_version = '3.10'
disable_error_code = ["no-any-return"]
strict = true
ignore_missing_imports = true
check_untyped_defs = true

[tool.black]
line-length = 100

[tool.ruff]
line-length = 100
preview = true

[tool.ruff.format]

[tool.ruff.lint]
preview = true
extend-select = ['I', 'PLW1514']
unfixable = ['F401']
