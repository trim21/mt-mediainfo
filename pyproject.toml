[project]
name = 'pt-repost'
version = '0'
requires-python = '~=3.10.17'
description = ''
dependencies = [
    'orjson==3.11.3',
    "uuid-utils==0.11.1",
    'rich==14.1.0',
    'xxhash==3.6.0',
    'qbittorrent-api==2025.7.0',
    'click==8.3.0',
    'pydantic==2.11.7',
    'httpx==0.28.1',
    'bencode2==0.3.26',
    'tomli==2.2.1',
    'yarl==1.20.1',
    'psycopg[binary,pool]==3.2.10',
    'durationpy==0.10',
    'fastapi==0.118.0',
    'uvicorn==0.37.0',
    'rapidocr-onnxruntime==1.4.4',
    'jinja2==3.1.6',
    'tzdata',
    "six==1.17.0",
    "tenacity==9.1.2",
    "more-itertools==10.8.0",
    "sslog==0.0.0a52",
    "regex==2025.9.18",
    "asyncpg==0.30.0",
]

[dependency-groups]
dev = [
    "asyncpg-stubs==0.30.2",
    'mypy',
    "types-regex==2025.9.18.20250921",
    "types-six==1.17.0.20250515",
]

[tool.uv]
package = false

[tool.pytest.ini_options]
cache_dir = '.venv/.cache/pytest'

[tool.mypy]
exclude = 'build,data'
mypy_path = '$MYPY_CONFIG_FILE_DIR'
python_version = '3.10'
disable_error_code = ["no-any-return"]
strict = true
ignore_missing_imports = true
check_untyped_defs = true

[tool.black]
line-length = 100

[tool.ruff]
line-length = 100
preview = true

[tool.ruff.format]

[tool.ruff.lint]
preview = true
extend-select = ['I', 'PLW1514']
unfixable = ['F401']
